<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Scheduling</title>
    <!-- Add Bootstrap CSS link -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
        }
        form {
            max-width: 400px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745; /* Green color from Bootstrap */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="jumbotron">
            <h2 class="display-4">Service Scheduling</h2>
        </div>
        <form id="serviceForm">
            <div class="form-group">
                <label for="serviceName">LOCATION</label>
                <select class="form-control" id="serviceName" name="serviceName" required>
                    <option value="haircut">Location</option>
                    <option value="haircut">Sehore</option>
                    <option value="massage">Bhopal</option>
                    <option value="manicure">Indore</option>
                    <!-- Add more services as needed -->
                </select>
            </div>
            <div class="form-group">
                <label for="serviceName">Service:</label>
                <select class="form-control" id="serviceName" name="serviceName" required>
                    <option value="haircut">SERVICE</option>
                    <option value="haircut">Bathroom </option>
                    <option value="massage">Room</option>
                    <option value="manicure">Whole Building</option>
                    <!-- Add more services as needed -->
                </select>
            </div>
            <div class="form-group">
                <label for="date">Date:</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time">Time:</label>
                <input type="time" class="form-control" id="time" name="time" required>
            </div>

            <div class="form-group">
                <label for="additionalInfo">Additional Information:</label>
                <textarea class="form-control" id="additionalInfo" name="additionalInfo" rows="4"></textarea>
            </div>

            <!-- Updated button to redirect to payment.html -->
            <a href="payment.html" class="btn btn-success" role="button">Schedule Service</a>
            <a href="thankyou.html" class="btn btn-success" role="button">Pay After Service</a>
        </form>
    </div>

    <!-- Add Bootstrap JS and Popper.js scripts (required for Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
