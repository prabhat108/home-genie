<body>

        <div class="dropdown location-dropdown ml-2">
            <button class="btn btn-light dropdown-toggle" type="button" id="locationDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">

            <div class="dropdown-menu" aria-labelledby="locationDropdown">

        <div class="collapse navbar-collapse" id="navbarNav">

           <a href="signup.html" class="btn btn-light ml-2 login-button">Signup</a>

 <div class="h1-container">
    <h1 class="font-weight-bold font-italic">Services We Offer</h1>
 </div>

 <div class="image-grid">
    <!-- Top Left Image -->
    <div class="image-container">
        <img src="s1.png" alt="Appall" width="525" height="185">
        <a href="#" class="click-me">View Details</a>
    </div>

    <!-- Top Right Image -->
    <div class="image-container">
        <img src="s2.png" alt="Appkit" width="525" height="185">
        <a href="#" class="click-me">View Details</a>
    </div>

    <!-- Bottom Left Image -->
    <div class="image-container">

    <!-- Bottom Left Image -->

        <img src="s6.png" alt="Appdig" width="525" height="185">
        <a href="#" class="click-me">View Details</a>
    </div>
 </div>


<div class="secondary-body">
    <!-- Left Div -->
    <div class="left-div">
        <h4 class="left-heading">Let's Number Talk.</h4>
        <div class="grid-container">
            <!-- Top Left Rectangle -->
            <div class="grid-item">
                <p>5+<br>Variety<br>Services</p>
            </div>
            <!-- Top Right Rectangle -->
            <div class="grid-item">
                <p>150+<br>Partners</p>
            </div>
            <!-- Bottom Left Rectangle -->
            <div class="grid-item">
                <p>25000+<br>Happy<br>Customers</p>
            </div>
            <!-- Bottom Right Rectangle -->
            <div class="grid-item">
                <p>200+<br>Expert<br>Technicians</p>
            </div>
        </div>
    </div>

    <!-- Right Div -->
    <div class="right-div">
        <h4 class="right-heading">Fill up the form to get a call from us</h4>
        <form class="request-form">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required>

            <label for="phoneNumber">Phone Number:</label>
            <input type="text" id="phoneNumber" name="phoneNumber" required>

            <label for="pinCode">Pin Code (Optional):</label>
            <input type="text" id="pinCode" name="pinCode">

            <label for="warrantyExpired">Warranty Expired?</label>
            <select id="warrantyExpired" name="warrantyExpired">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <label for="selectAppliance">Select Appliance:</label>
            <select id="selectAppliance" name="selectAppliance">
                <option value="appliance1">Appliance 1</option>
                <option value="appliance2">Appliance 2</option>
                <option value="appliance3">Appliance 3</option>
            </select>

            <button type="submit" class="service-request-button">Service Request</button>
        </form>
    </div>
</div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
